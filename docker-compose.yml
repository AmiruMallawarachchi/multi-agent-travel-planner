version: "3.9"

# Local dev only - each service also has its own Dockerfile + railway.json
# for independent production deployment (SRS 9: "MCP servers run as their
# own processes"). `docker compose up` wires the four together with the
# same env vars the deployed system uses, just pointed at each other by
# service name instead of public URLs.

services:
  hotel-mcp:
    build: ./mcp_servers/hotel_mcp
    env_file: ./mcp_servers/hotel_mcp/.env
    ports: ["8001:8001"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  flight-mcp:
    build: ./mcp_servers/flight_mcp
    env_file: ./mcp_servers/flight_mcp/.env
    ports: ["8002:8002"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      HOTEL_MCP_URL: http://hotel-mcp:8001/mcp
      FLIGHT_MCP_URL: http://flight-mcp:8002/mcp
      ALLOWED_ORIGINS: http://localhost:3000
    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      hotel-mcp: { condition: service_healthy }
      flight-mcp: { condition: service_healthy }

  frontend:
    build: ./frontend
    env_file: ./frontend/.env
    environment:
      BACKEND_URL: http://backend:8000
    ports: ["3000:3000"]
    depends_on:
      backend: { condition: service_healthy }
